{% extends 'base.html' %}

{% block title %}Shikoyatlar ro'yxati{% endblock %}

{% block content %}
<div class="py-8">
    <h2 class="text-2xl font-bold mb-8">Barcha shikoyatlar</h2>
    <div class="space-y-4">
        {% for complaint in complaints %}
        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-100 dark:bg-red-900/20 text-red-600 rounded-full flex items-center justify-center font-bold text-lg">!</div>
                <div>
                    <h4 class="font-bold">Kimdan: {{ complaint.user.username }}</h4>
                    <p class="text-sm text-gray-500">{{ complaint.subject }}</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs text-gray-400">{{ complaint.created_at|date:"d.m.Y" }}</span>
                <a href="{% url 'client:complaint_detail' complaint.pk %}" class="bg-gray-100 dark:bg-gray-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-gray-200 transition">Ochish</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
