{% extends 'base.html' %}

{% block title %}Kirish - Free.uz{% endblock %}

{% block content %}
<section class="flex items-center justify-center py-20 px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-100 dark:border-gray-700">
        <h2 class="text-2xl font-bold text-center mb-6">Xush kelibsiz!</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">Foydalanuvchi nomi</label>
                <input type="text" name="username" class="w-full px-4 py-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Parol</label>
                <input type="password" name="password" class="w-full px-4 py-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Kirish</button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-500">
            Akkountingiz yo'qmi? <a href="{% url 'client:register' %}" class="text-blue-600 font-bold">Ro'yxatdan o'ting</a>
        </p>
    </div>
</section>
{% endblock %}
